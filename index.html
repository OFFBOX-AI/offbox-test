<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OFF BOX Studios — Test</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #191919;
    color: #E6E6E6;
    font-family: 'Segoe UI', Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .colorbar {
    height: 3px;
    background: linear-gradient(90deg, #FF6B9D 0%, #39D98A 25%, #FFB800 50%, #43D9FF 75%, #A78BFA 100%);
    position: fixed;
    top: 0; left: 0; right: 0;
  }

  .card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(230,230,230,0.1);
    border-radius: 16px;
    padding: 40px 36px;
    width: 100%;
    max-width: 460px;
  }

  .studio-label {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(230,230,230,0.35);
    margin-bottom: 10px;
  }

  h1 {
    font-size: 22px;
    font-weight: 600;
    color: #E6E6E6;
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 13px;
    color: rgba(230,230,230,0.4);
    margin-bottom: 32px;
    line-height: 1.5;
  }

  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.5px;
    color: rgba(230,230,230,0.5);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  input[type="text"],
  textarea {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(230,230,230,0.12);
    border-radius: 10px;
    color: #E6E6E6;
    font-size: 15px;
    padding: 13px 16px;
    font-family: inherit;
    margin-bottom: 22px;
    transition: border-color 0.15s;
    outline: none;
  }

  input[type="text"]:focus,
  textarea:focus {
    border-color: #43D9FF;
  }

  input[type="text"]::placeholder,
  textarea::placeholder {
    color: rgba(230,230,230,0.25);
  }

  textarea {
    min-height: 110px;
    resize: vertical;
  }

  .btn {
    width: 100%;
    background: #43D9FF;
    border: none;
    border-radius: 10px;
    color: #191919;
    font-size: 15px;
    font-weight: 700;
    padding: 15px;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.3px;
    transition: opacity 0.15s, transform 0.1s;
  }

  .btn:hover { opacity: 0.88; }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .success {
    display: none;
    text-align: center;
    padding: 16px 0;
  }

  .success-check {
    width: 56px;
    height: 56px;
    background: rgba(57,217,138,0.12);
    border: 1px solid rgba(57,217,138,0.3);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 18px;
  }

  .success-check svg {
    width: 24px;
    height: 24px;
    stroke: #39D98A;
    fill: none;
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .success h2 {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 8px;
  }

  .success p {
    font-size: 14px;
    color: rgba(230,230,230,0.45);
    margin-bottom: 6px;
    line-height: 1.5;
  }

  .again-link {
    display: inline-block;
    margin-top: 20px;
    font-size: 13px;
    color: #43D9FF;
    cursor: pointer;
    text-decoration: none;
    border-bottom: 1px solid rgba(67,217,255,0.3);
    padding-bottom: 1px;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    font-family: inherit;
  }

  .error-msg {
    display: none;
    font-size: 12px;
    color: #FF6B9D;
    margin-top: -16px;
    margin-bottom: 16px;
    padding-left: 4px;
  }
</style>
</head>
<body>

<div class="colorbar"></div>

<div class="card">
  <div class="studio-label">OFF BOX Studios</div>
  <h1>Connection Test</h1>
  <p class="subtitle">Write your name and anything. Hit submit. If it shows up in the sheet, we are live.</p>

  <div id="form-section">
    <label>Your name</label>
    <input type="text" id="name" placeholder="e.g. Abdullah" autocomplete="off">

    <label>Your message</label>
    <textarea id="message" placeholder="Write anything here..."></textarea>

    <div class="error-msg" id="error-msg">Please fill in both fields before submitting.</div>

    <button class="btn" id="submit-btn" onclick="handleSubmit()">Submit</button>
  </div>

  <div class="success" id="success-section">
    <div class="success-check">
      <svg viewBox="0 0 24 24">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>
    <h2>Submitted</h2>
    <p>Your entry is in the sheet.</p>
    <p>Ask your friend to do the same, then check Google Sheets.</p>
    <button class="again-link" onclick="resetForm()">Submit another entry</button>
  </div>
</div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxTb_hjuF4RjscPH00ICf5aU_LarC0jDJ04245F-KVMKyJ5ac5oTEVIJEB2vzkGbeq4/exec';

  window.onload = function() {
    const saved = localStorage.getItem('offbox_test_name');
    if (saved) document.getElementById('name').value = saved;
  };

  function handleSubmit() {
    const name = document.getElementById('name').value.trim();
    const message = document.getElementById('message').value.trim();
    const errorMsg = document.getElementById('error-msg');
    const btn = document.getElementById('submit-btn');

    errorMsg.style.display = 'none';

    if (!name || !message) {
      errorMsg.style.display = 'block';
      return;
    }

    localStorage.setItem('offbox_test_name', name);

    btn.disabled = true;
    btn.textContent = 'Submitting...';

    const payload = {
      name: name,
      message: message,
      timestamp: new Date().toISOString()
    };

    fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    })
    .then(function() {
      document.getElementById('form-section').style.display = 'none';
      document.getElementById('success-section').style.display = 'block';
    })
    .catch(function() {
      btn.disabled = false;
      btn.textContent = 'Submit';
      alert('Something went wrong. Check your script URL and try again.');
    });
  }

  function resetForm() {
    document.getElementById('message').value = '';
    document.getElementById('form-section').style.display = 'block';
    document.getElementById('success-section').style.display = 'none';
    document.getElementById('submit-btn').disabled = false;
    document.getElementById('submit-btn').textContent = 'Submit';
    document.getElementById('error-msg').style.display = 'none';
  }
</script>

</body>
</html>
